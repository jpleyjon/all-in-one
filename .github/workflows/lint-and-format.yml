name: Lint and Format

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ESLint
        run: ./bin/lint

      - name: Run Prettier check
        run: ./bin/format-check
