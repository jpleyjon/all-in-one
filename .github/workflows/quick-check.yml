name: Quick Check

on: [push, pull_request]

jobs:
  quick-test:
    name: Quick Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install and Test
      run: |
        npm ci
        npx tsc
        npm test
    
    - name: Success
      run: echo "✅ All tests passed successfully!"
